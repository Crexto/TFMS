<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TFMS - Master</title>
    <style>
        :root {
            --primary-bg: #2c3e50;
            --accent-color: #3498db;
            --text-light: #ecf0f1;
            --sidebar-width: 250px;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            background-color: #f4f7f6;
        }

        .sidebar {
            width: var(--sidebar-width);
            background-color: var(--primary-bg);
            height: 100vh;
            color: var(--text-light);
            position: fixed;
        }

        .sidebar-header {
            padding: 20px;
            text-align: center;
            background: #1a252f;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .nav-menu {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .nav-item {
            padding: 15px 25px;
            border-bottom: 1px solid #2c3e50;
            cursor: pointer;
            transition: 0.3s;
        }

        .submenu {
            background-color: #2c3e50;
            padding-left: 20px;
            display: block; 
        }

        .submenu-item {
            padding: 12px 20px;
            font-size: 0.9rem;
            cursor: pointer;
            border-left: 3px solid transparent;
        }

        .submenu-item:hover {
            border-left: 3px solid var(--accent-color);
            color: var(--accent-color);
        }

        .main-content {
            margin-left: var(--sidebar-width);
            padding: 40px;
            width: 100%;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        h2 { color: var(--primary-bg); margin-top: 0; }
        
        .active-form { display: block; }
        .hidden-form { display: none; }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="sidebar-header">TFMS Admin</div>
        <ul class="nav-menu">
            <li class="nav-item">
                <strong>Master</strong>
                <div class="submenu">
                    <div class="submenu-item" onclick="showForm('route')">Route Master</div>
                    <div class="submenu-item" onclick="showForm('supplier')">Supplier</div>
                </div>
            </li>
        </ul>
    </nav>

    <main class="main-content">
        
        <div id="route-form" class="card active-form">
            <h2>Route Entry</h2>
            <hr>
            <form method="POST", action="{{ url_for('route') }}">
                <label>Created By: </label>
                <input name="CreatedBy" type="number" required><br><br>

                <label>Updated By: </label>
                <input name="UpdatedBy" type="number" required><br><br>

                <label>Company Id: </label>
                <input name="CompanyId" type="number" required><br><br>

                <label>Route Code: </label>
                <input name="RouteCode" maxlength="5" type="text" required><br><br>

                <label>Route Name: </label>
                <input name="RouteName" type="text"><br><br>

                <label>Last sup number: </label>
                <input name="LastSupNo" type="number" required><br><br>

                <label>Route Order: </label>
                <input name="RouteOrder" type="number" required><br><br>

                <label>Route Device No: </label>
                <input name="RouteDeviceNo" maxlength="10" type="text"><br><br>

                <label>GPS Location: </label>
                <input name="GPSLocation" type="text" required><br><br>

                <label>Status: </label>
                <input name="Status" maxlength="10" type="text" required><br><br>

                <label>Active: </label>
                <input type="checkbox" id="active" name="active" checked><br><br>

                <label>Router Manager Id: </label>
                <input name="RouteManagerId" type="number"><br><br>

                <label>Consolidation Id: </label>
                <input name="ConsolidationId" type="number"><br><br>

                <label>Transport Id: </label>
                <input name="TransportId" type="number" required><br><br>

                <label>Category 01</label>
                <input type="text" name="category_01" maxlength="10" required><br><br>

                <label>Category 02</label>
                <input type="text" name="category_02" maxlength="10" required><br><br>

                <label>Category 03</label>
                <input type="text" name="category_03" maxlength="10" required ><br><br>

                <label>Category 04</label>
                <input type="text" name="category_04" maxlength="10" required><br><br>

                <label>Category 05</label>
                <input type="text" name="category_05" maxlength="10" required><br><br>



                <button type="submit">Submit</button>
        
            </form>
        </div>

        <div id="supplier-form" class="card hidden-form">
            <h2>Supplier Entry</h2>
            <hr>
            <form action="{{ url_for('supplier') }}" method="POST">
    
                <label>Registration Number: </label>
                <input name="reg_no" type="number" required><br><br>

                <label>Registration Name: </label>
                <input name="reg_name" type="text" maxlength="50" required><br><br>

                <label>NIC Number: </label>
                <input name="nic_no" type="text" maxlength="20"><br><br>

                <label>Date of Birth: </label>
                <input name="dob" type="date" required><br><br>

                <label>Enrolled Date: </label>
                <input name="enrolled_date" type="date" required><br><br>

                <label>Is Active: </label>
                <input name="is_active" id="active" type="checkbox" checked><br><br>

                <label>Company ID: </label>
                <input name="company_id" type="number" required><br><br>

                <label>Product ID: </label>
                <input name="product_id" type="number"><br><br>

                <label>Route ID: </label>
                <input name="route_id" type="number"><br><br>

                <label>Branch ID: </label>
                <input name="branch_id" type="number" value="0"><br><br>

                <label>Bank ID: </label>
                <input name="bank_id" type="number"><br><br>

                <label>Bank Account Name: </label>
                <input name="bank_account_name" type="text" maxlength="50"><br><br>

                <label>Bank Account Number: </label>
                <input name="bank_account" type="text" maxlength="20"><br><br>

                <label>Payment Mode: </label>
                <input name="pay_mode" type="text" maxlength="10" value="Cash"><br><br>

                <label>Advance Payment Type: </label>
                <input name="advance_pay_type" type="text" maxlength="20"><br><br>

                <label>Advance Status: </label>
                <input name="advance_status" id="active" type="checkbox" checked><br><br>

                <label>Welfare Registered: </label>
                <input name="welfare_registered" id="active" type="checkbox"><br><br>

                <label>Saving Scheme Registered: </label>
                <input name="saving_scheme_registered"  id="active" type="checkbox"><br><br>

                <label>Saving Amount: </label>
                <input name="saving_amount" type="number" step="0.01" value="0.00"><br><br>

                <label>Other Scheme Registered: </label>
                <input name="other_scheme_registered" id="active" type="checkbox"><br><br>

                <label>Collector: </label>
                <input name="collector" id="active" type="checkbox"><br><br>

                <label>Collector Number: </label>
                <input name="collector_no" type="text" maxlength="50"><br><br>

                <label>Address Line 01: </label>
                <input name="address_line01" type="text" maxlength="50"><br><br>

                <label>Address Line 02: </label>
                <input name="address_line02" type="text" maxlength="50"><br><br>

                <label>Address Line 03: </label>
                <input name="address_line03" type="text" maxlength="50"><br><br>

                <label>Address Line 04: </label>
                <input name="address_line04" type="text" maxlength="50"><br><br>

                <label>Estate Name: </label>
                <input name="estate_name" type="text" maxlength="50"><br><br>

                <label>Telephone: </label>
                <input name="telephone" type="text" maxlength="10"><br><br>

                <label>Acreage: </label>
                <input name="acreage" type="number" step="0.01" value="0.00"><br><br>

                <label>Hectreage: </label>
                <input name="hectreage" type="number" step="0.01" value="0.00"><br><br>

                <label>Rood: </label>
                <input name="rood" type="number" step="0.01" value="0.00"><br><br>

                <label>Purch: </label>
                <input name="purch" type="number" step="0.01" value="0.00"><br><br>

                <label>Transport ID: </label>
                <input name="transport_id" type="number" required><br><br>

                <label>Transport Type: </label>
                <input name="transporttype" type="number" required><br><br>

                <label>Transport Incentive: </label>
                <input name="transport_incentive" type="number" step="0.01"><br><br>

                <label>CF Coins: </label>
                <input name="cf_coins" type="number" step="0.01"><br><br>

                <label>Member Fee: </label>
                <input name="member_fee" type="number" step="0.01" value="0.00"><br><br>

                <label>Other Fee: </label>
                <input name="other_fee" type="number" step="0.01" value="0.00"><br><br>

                <label>Notes: </label>
                <textarea name="notes"></textarea><br><br>

                <label>BSSMS Status: </label>
                <input name="bssmsstatus" type="text" maxlength="1"><br><br>

                <label>Analysis Code 01: </label>
                <input name="analysiscode01" type="text" maxlength="20"><br><br>

                <label>Analysis Code 02: </label>
                <input name="analysiscode02" type="text" maxlength="20"><br><br>

                <label>Analysis Code 03: </label>
                <input name="analysiscode03" type="text" maxlength="20"><br><br>

                <label>Analysis Code 04: </label>
                <input name="analysiscode04" type="text" maxlength="20"><br><br>

                <label>Analysis Code 05: </label>
                <input name="analysiscode05" type="text" maxlength="20"><br><br>

                <label>Created By: </label>
                <input name="created_by" type="number" required><br><br>

                <label>Updated By: </label>
                <input name="updated_by" type="number" required><br><br>

                <label>Partner ID: </label>
                <input name="partner_id" type="number" required><br><br>

                <label>Manure tr type: </label>
                <input name="manure_tr_type" type="text" maxlength="1" required><br><br>

                <label>Manure tr ID: </label>
                <input name="manure_tr_id" type="number" required><br><br>

                <button type="submit">Register Supplier</button>
            </form>
        </div>

    </main>

    <script>
        function showForm(type) {
            const route = document.getElementById('route-form');
            const supplier = document.getElementById('supplier-form');

            if(type === 'route') {
                route.classList.remove('hidden-form');
                supplier.classList.add('hidden-form');
            } else {
                supplier.classList.remove('hidden-form');
                route.classList.add('hidden-form');
            }
        }
    </script>

</body>
</html>
