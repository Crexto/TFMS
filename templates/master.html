<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TFMS - Master</title>
    <style>
        :root {
            --primary-bg: #2c3e50;
            --accent-color: #3498db;
            --text-light: #ecf0f1;
            --sidebar-width: 250px;
            --success-green: #27ae60;
            --error-red: #e74c3c;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            background-color: #f4f7f6;
        }

        .sidebar {
            width: var(--sidebar-width);
            background-color: var(--primary-bg);
            height: 100vh;
            color: var(--text-light);
            position: fixed;
        }

        .sidebar-header {
            padding: 20px;
            text-align: center;
            background: #1a252f;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .nav-menu {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .nav-item-header {
            padding: 15px 25px;
            background: #34495e;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #95a5a6;
        }

        .submenu {
            list-style: none;
            padding: 1;
        }

        .submenu-item a {
            display: block;
            padding: 12px 25px;
            color: var(--text-light);
            text-decoration: none;
            font-size: 0.9rem;
            transition: 0.3s;
            border-left: 4px solid transparent;
        }

        .submenu-item a:hover {
            background: #3e5871;
            border-left: 4px solid var(--accent-color);
            color: var(--accent-color);
        }

        .main-content {
            margin-left: var(--sidebar-width);
            padding: 40px;
            width: calc(100% - var(--sidebar-width));
        }

        .alert {
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 4px;
            color: white;
        }
        .alert-success { background-color: var(--success-green); }
        .alert-danger { background-color: var(--error-red); }

        .card {
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="sidebar-header">TFMS Admin</div>
        <ul class="nav-menu">
            <li class="nav-item-header">Logged in as User 03</li>
            <li class="submenu-item">
                <a href="{{ url_for('main') }}">Dashboard</a>
            </li>

            <li class="submenu-item">
                <a href="{{ url_for('supplier.supplier',type='') }}"><strong>Supplier Master</strong></a>
                <ul class="submenu">
                    <li class="submenu-item"><a href="{{ url_for('supplier.supplier',type='add') }}">Add New Supplier</a></li>
                    <li class="submenu-item"><a href="{{ url_for('supplier.supplier',type='manage') }}">Update/View All</a></li>
                </ul>
            </li>

            <li class="submenu-item">
                <a href="{{ url_for('route.route',type='') }}"><strong>Route Master</strong></a>
                <ul class="submenu">
                    <li class="submenu-item"><a href="{{ url_for('route.route',type='add') }}">Add New Route</a></li>
                    <li class="submenu-item"><a href="{{ url_for('route.route',type='manage') }}">Update/View All</a></li>
                </ul>
            </li>
        </ul>
    </nav>

    <main class="main-content">
        
        <div class="card">
            <h2>Welcome to TFMS</h2>
            <p>Select an option from the sidebar to manage your factory data.</p>
        </div>
    </main>

</body>
</html>
