<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TFMS - Master</title>
    <style>
        :root {
            --primary-bg: #2c3e50;
            --accent-color: #3498db;
            --text-light: #ecf0f1;
            --sidebar-width: 250px;
            --success-green: #27ae60;
            --error-red: #e74c3c;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            background-color: #f4f7f6;
        }

        .sidebar {
            width: var(--sidebar-width);
            background-color: var(--primary-bg);
            height: 100vh;
            color: var(--text-light);
            position: fixed;
        }

        .sidebar-header {
            padding: 20px;
            text-align: center;
            background: #1a252f;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .nav-menu {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .nav-item-header {
            padding: 15px 25px;
            background: #34495e;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #95a5a6;
        }

        .submenu {
            list-style: none;
            padding: 1;
        }

        .submenu-item a {
            display: block;
            padding: 12px 25px;
            color: var(--text-light);
            text-decoration: none;
            font-size: 0.9rem;
            transition: 0.3s;
            border-left: 4px solid transparent;
        }

        .submenu-item a:hover {
            background: #3e5871;
            border-left: 4px solid var(--accent-color);
            color: var(--accent-color);
        }

        .main-content {
            margin-left: var(--sidebar-width);
            padding: 40px;
            width: calc(100% - var(--sidebar-width));
        }

        .alert {
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 4px;
            color: white;
        }
        .alert-success { background-color: var(--success-green); }
        .alert-danger { background-color: var(--error-red); }

        .card {
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="sidebar-header">TFMS Admin</div>
        <ul class="nav-menu">
            <li class="nav-item-header">Logged in as Crex</li>
            <li class="submenu-item">
                <a href="{{ url_for('main') }}">Dashboard</a>
            </li>

            <li class="submenu-item">
                <a href="{{ url_for('supplier.supplier',type='') }}"><strong>Supplier Master</strong></a>
                <ul class="submenu">
                    <li class="submenu-item"><a href="{{ url_for('supplier.supplier',type='add') }}">Add New Supplier</a></li>
                    <li class="submenu-item"><a href="{{ url_for('supplier.supplier',type='manage') }}">Update/View All</a></li>
                </ul>
            </li>

            <li class="submenu-item">
                <a href="{{ url_for('route.route',type='') }}"><strong>Route Master</strong></a>
                <ul class="submenu">
                    <li class="submenu-item"><a href="{{ url_for('route.route',type='add') }}">Add New Route</a></li>
                    <li class="submenu-item"><a href="{{ url_for('route.route',type='manage') }}">Update/View All</a></li>
                </ul>
            </li>
        </ul>
    </nav>

    <main class="main-content">

        <h2>Supplier Edit</h2>
        <hr>

        <form id="SupF" action="{{ url_for('supplier.supplierEdit',id=id) }}" method="POST" enctype="multipart/form-data">
            
            <label>Created By: </label>
            <input name="created_by" type="number" value="{{a[0]}}" readonly><br><br>

            <label>Updated By: </label>
            <input name="updated_by" type="number" value="{{a[1]}}" readonly><br><br>

            <label>Registration Number: </label>
            <input name="reg_no" type="number" value="{{a[4]}}" required><br><br>

            <label>Is active: </label>
            <input name="is_active" type="checkbox" {% if a[40] %}checked{% endif %}><br><br>

            <label>Registration Name: </label>
            <input name="reg_name" type="text" maxlength="50" value="{{a[7]}}" required><br><br>

            <label>NIC Number: </label>
            <input name="nic_no" type="text" maxlength="20" value="{{a[37]}}"><br><br>

            <label>Date of Birth: </label>
            <input name="dob" type="date" value="{{a[19]}}"><br><br>

            <label>Enrolled Date: </label>
            <input name="enrolled_date" type="date" value="{{a[20]}}"><br><br>

            <label>Company ID: </label>
            <input name="company_id" type="number" value="{{a[2]}}"><br><br>

            <label>Product ID: </label>
            <input name="product_id" type="number" value="{{a[3]}}"><br><br>

            <label>Route ID: </label>
            <input name="route_id" type="number" value="{{a[5]}}" required><br><br>

            <label>Branch ID: </label>
            <input name="branch_id" type="number" value="{{a[16]}}"><br><br>

            <label>Bank ID: </label>
            <input name="bank_id" type="number" value="{{a[8]}}"><br><br>

            <label>Bank Account Name: </label>
            <input name="bank_account_name" type="text" maxlength="50" value="{{a[39]}}"><br><br>

            <label>Bank Account Number: </label>
            <input name="bank_account" type="text" maxlength="20" value="{{a[9]}}"><br><br>

            <label>Payment Mode: </label>
            <input name="pay_mode" type="text" maxlength="10" value="{{a[17]}}"><br><br>

            <label>Advance Payment Type: </label>
            <input name="advance_pay_type" type="text" maxlength="20" value="{{a[34]}}"><br><br>

            <label>Advance Status: </label>
            <input name="advance_status" type="checkbox" {% if a[33] %}checked{% endif %}><br><br>

            <label>Welfare Registered: </label>
            <input name="welfare_registered" type="checkbox" {% if a[10] %}checked{% endif %}><br><br>

            <label>Saving Scheme Registered: </label>
            <input name="saving_scheme_registered" type="checkbox" {% if a[11] %}checked{% endif %}><br><br>

            <label>Saving Amount: </label>
            <input name="saving_amount" type="number" step="0.01" value="{{a[12]}}"><br><br>

            <label>Other Scheme Registered: </label>
            <input name="other_scheme_registered" type="checkbox" {% if a[13] %}checked{% endif %}><br><br>

            <label>Collector: </label>
            <input name="collector" type="checkbox" {% if a[14] %}checked{% endif %}><br><br>

            <label>Collector Number: </label>
            <input name="collector_no" type="text" maxlength="50" value="{{a[15]}}"><br><br>

            <label>Address Line 01: </label>
            <input name="address_line01" type="text" maxlength="50" value="{{a[41]}}"><br><br>

            <label>Address Line 02: </label>
            <input name="address_line02" type="text" maxlength="50" value="{{a[42]}}"><br><br>

            <label>Address Line 03: </label>
            <input name="address_line03" type="text" maxlength="50" value="{{a[43]}}"><br><br>

            <label>Address Line 04: </label>
            <input name="address_line04" type="text" maxlength="50" value="{{a[44]}}"><br><br>

            <label>Estate Name: </label>
            <input name="estate_name" type="text" maxlength="50" value="{{a[45]}}"><br><br>

            <label>Telephone: </label>
            <input name="telephone" type="text" maxlength="10" value="{{a[46]}}"><br><br>

            <label>Acreage: </label>
            <input name="acreage" type="number" step="0.01" value="{{a[24]}}"><br><br>

            <label>Hectreage: </label>
            <input name="hectreage" type="number" step="0.01" value="{{a[25]}}"><br><br>

            <label>Rood: </label>
            <input name="rood" type="number" step="0.01" value="{{a[26]}}"><br><br>

            <label>Purch: </label>
            <input name="purch" type="number" step="0.01" value="{{a[27]}}"><br><br>

            <label>Transport ID: </label>
            <input name="transport_id" type="number" value="{{a[38]}}"><br><br>

            <label>Transport Type: </label>
            <input name="transporttype" type="number" value="{{a[23]}}"><br><br>

            <label>Transport Incentive: </label>
            <input name="transport_incentive" type="number" step="0.01" value="{{a[47]}}"><br><br>

            <label>CF Coins: </label>
            <input name="cf_coins" type="number" step="0.01" value="{{a[18]}}"><br><br>

            <label>Member Fee: </label>
            <input name="member_fee" type="number" step="0.01" value="{{a[48]}}"><br><br>

            <label>Other Fee: </label>
            <input name="other_fee" type="number" step="0.01" value="{{a[49]}}"><br><br>

            <label>Notes: </label>
            <textarea name="notes">{{a[21]}}</textarea><br><br>

            <label>BSSMS Status: </label>
            <input name="bssmsstatus" type="text" maxlength="1" value="{{a[22]}}"><br><br>

            <label>Analysis Code 01: </label>
            <input name="analysiscode01" type="text" maxlength="20" value="{{a[28]}}"><br><br>

            <label>Analysis Code 02: </label>
            <input name="analysiscode02" type="text" maxlength="20" value="{{a[29]}}"><br><br>

            <label>Analysis Code 03: </label>
            <input name="analysiscode03" type="text" maxlength="20" value="{{a[30]}}"><br><br>

            <label>Analysis Code 04: </label>
            <input name="analysiscode04" type="text" maxlength="20" value="{{a[31]}}"><br><br>

            <label>Analysis Code 05: </label>
            <input name="analysiscode05" type="text" maxlength="20" value="{{a[32]}}"><br><br>

            <label>Partner ID: </label>
            <input name="partner_id" type="number" value="{{a[6]}}"><br><br>

            <label>Manure tr type: </label>
            <input name="manure_tr_type" type="text" maxlength="1" value="{{a[35]}}"><br><br>

            <label>Manure tr ID: </label>
            <input name="manure_tr_id" type="number" value="{{a[36]}}"><br><br>

            <label>Supplier: </label>
            <input name="supplier" type="file"><br><br>

            <button type="submit">Save Supplier</button>
        </form>

        <script>
        document.getElementById("SupF").addEventListener("submit", function(event) {
            if (!confirm("Are you sure you want to submit this form?")) {
                event.preventDefault();
            }
        });
        </script>

    </main>

</body>
</html>
