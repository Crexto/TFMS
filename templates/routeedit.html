<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TFMS - Master</title>
    <style>
        :root {
            --primary-bg: #2c3e50;
            --accent-color: #3498db;
            --text-light: #ecf0f1;
            --sidebar-width: 250px;
            --success-green: #27ae60;
            --error-red: #e74c3c;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            background-color: #f4f7f6;
        }

        .sidebar {
            width: var(--sidebar-width);
            background-color: var(--primary-bg);
            height: 100vh;
            color: var(--text-light);
            position: fixed;
        }

        .sidebar-header {
            padding: 20px;
            text-align: center;
            background: #1a252f;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .nav-menu {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .nav-item-header {
            padding: 15px 25px;
            background: #34495e;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #95a5a6;
        }

        .submenu {
            list-style: none;
            padding: 1;
        }

        .submenu-item a {
            display: block;
            padding: 12px 25px;
            color: var(--text-light);
            text-decoration: none;
            font-size: 0.9rem;
            transition: 0.3s;
            border-left: 4px solid transparent;
        }

        .submenu-item a:hover {
            background: #3e5871;
            border-left: 4px solid var(--accent-color);
            color: var(--accent-color);
        }

        .main-content {
            margin-left: var(--sidebar-width);
            padding: 40px;
            width: calc(100% - var(--sidebar-width));
        }

        .alert {
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 4px;
            color: white;
        }
        .alert-success { background-color: var(--success-green); }
        .alert-danger { background-color: var(--error-red); }

        .card {
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="sidebar-header">TFMS Admin</div>
        <ul class="nav-menu">
            <li class="nav-item-header">Logged in as User 03</li>
            <li class="submenu-item">
                <a href="{{ url_for('main') }}">Dashboard</a>
            </li>

            <li class="submenu-item">
                <a href="{{ url_for('supplier.supplier',type='') }}"><strong>Supplier Master</strong></a>
                <ul class="submenu">
                    <li class="submenu-item"><a href="{{ url_for('supplier.supplier',type='add') }}">Add New Supplier</a></li>
                    <li class="submenu-item"><a href="{{ url_for('supplier.supplier',type='manage') }}">Update/View All</a></li>
                </ul>
            </li>

            <li class="submenu-item">
                <a href="{{ url_for('route.route',type='') }}"><strong>Route Master</strong></a>
                <ul class="submenu">
                    <li class="submenu-item"><a href="{{ url_for('route.route',type='add') }}">Add New Route</a></li>
                    <li class="submenu-item"><a href="{{ url_for('route.route',type='manage') }}">Update/View All</a></li>
                </ul>
            </li>
        </ul>
    </nav>

    <main class="main-content">

        <h2>Route Entry</h2>
        <hr>
        <form method="POST", id="RouteF", action="{{ url_for('route.routeEdit',id=id) }}">

            <label>Created Date: </label>
            <input value="{{s[0]}}" readonly><br><br>

            <label>Created By: </label>
            <input value="{{s[1]}}" readonly><br><br>

            <label>Is Active: </label>
            <input name="active" type="checkbox" {% if s[10] %}checked{% endif %}><br><br>

            <label>Company Id: </label>
            <input name="CompanyId" value="{{s[2]}}" type="number" required><br><br>

            <label>Route Code: </label>
            <input name="RouteCode" maxlength="5" value="{{s[3]}}" type="text" required><br><br>

            <label>Route Name: </label>
            <input name="RouteName" value="{{s[4]}}" type="text" required><br><br>

            <label>Last sup number: </label>
            <input name="LastSupNo" value="{{s[5]}}" type="number"><br><br>

            <label>Route Order: </label>
            <input name="RouteOrder" value="{{s[6]}}" type="number"><br><br>

            <label>Route Device No: </label>
            <input name="RouteDeviceNo" value="{{s[7]}}" maxlength="10" type="text"><br><br>

            <label>GPS Location: </label>
            <input name="GPSLocation" type="text" value="{{s[8]}}"><br><br>

            <label>Status: </label>
            <input name="Status" maxlength="10" value="{{s[9]}}" type="text" required><br><br>

            <label>Router Manager Id: </label>
            <input name="RouteManagerId" type="number" value="{{s[11]}}"><br><br>

            <label>Consolidation Id: </label>
            <input name="ConsolidationId" type="number" value="{{s[12]}}"><br><br>

            <label>Transport Id: </label>
            <input name="TransportId" type="number" value="{{s[13]}}" required><br><br>

            <label>Category 01</label>
            <input type="text" name="category_01" maxlength="10" value="{{s[14]}}" ><br><br>

            <label>Category 02</label>
            <input type="text" name="category_02" maxlength="10" value="{{s[15]}}"><br><br>

            <label>Category 03</label>
            <input type="text" name="category_03" maxlength="10"  value="{{s[16]}}"><br><br>

            <label>Category 04</label>
            <input type="text" name="category_04" maxlength="10" value="{{s[17]}}"><br><br>

            <label>Category 05</label>
            <input type="text" name="category_05" maxlength="10" value="{{s[18]}}"><br><br>

            <button type="submit">Save Route</button>
    
        </form>
        <script>
        document.getElementById("RouteF").addEventListener("submit", function(event) {
            if (!confirm("Are you sure you want to submit this form?")) {
                event.preventDefault();
            }
        });
        </script>

    </main>

</body>
</html>
